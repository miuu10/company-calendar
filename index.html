<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>온메디칼 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root { --navy: #0F172A; --navy2: #1E293B; --navy3: #334155; --slate: #64748B; --muted: #94A3B8; --border: #E2E8F0; --bg: #F1F5F9; --white: #FFFFFF; --blue: #3B82F6; --red: #EF4444; --green: #10B981; --yellow: #F59E0B; --purple: #8B5CF6; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; }

/* ── 토스트 ── */
#toasts { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--navy2); color: #fff; padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 24px rgba(0,0,0,.25); max-width: 340px; animation: slideIn .3s ease; }
.toast.alarm { border-left: 4px solid var(--yellow); background: #1C1917; }
.toast.success { background: #064E3B; }
.toast.error { background: #7F1D1D; }
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

/* ── 헤더 ── */
header { background: var(--navy); color: #fff; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 16px rgba(0,0,0,.2); position: sticky; top: 0; z-index: 100; }
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-brand .icon { font-size: 24px; }
.header-brand h1 { font-size: 18px; font-weight: 900; letter-spacing: -.5px; }
.header-brand p { font-size: 11px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.user-chip { background: var(--navy3); color: #fff; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; cursor: pointer; border: 1px solid #475569; }
.user-chip:hover { background: #475569; }

/* ── 버튼 ── */
.btn { border: none; border-radius: 10px; padding: 8px 16px; cursor: pointer; font-weight: 700; font-size: 13px; font-family: inherit; transition: all .15s; }
.btn:hover { filter: brightness(1.1); }
.btn-ghost { background: var(--white); border: 1.5px solid var(--border); color: var(--slate); }
.btn-primary { background: var(--blue); color: #fff; }
.btn-danger-soft { background: #FEF2F2; color: var(--red); }
.btn-arrow { background: var(--white); border: 1.5px solid var(--border); color: var(--slate); width: 38px; height: 38px; font-size: 18px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.btn-arrow:hover { background: var(--bg); }

/* ── 메인 레이아웃 ── */
main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 40px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.cal-nav h2 { font-size: 26px; font-weight: 900; letter-spacing: -1px; color: var(--navy); }
.calendar { background: var(--white); border-radius: 20px; box-shadow: 0 2px 20px rgba(0,0,0,.07); overflow: hidden; }
.day-headers { display: grid; grid-template-columns: repeat(7,1fr); background: #F8FAFC; border-bottom: 1.5px solid var(--border); }
.day-header { text-align: center; padding: 13px 0; font-size: 12px; font-weight: 800; color: var(--slate); letter-spacing: .5px; min-width: 0; }
.day-header.sun { color: var(--red); }
.day-header.sat { color: var(--blue); }
.cells { display: grid; grid-template-columns: repeat(7,1fr); }
.cell { min-height: 96px; padding: 7px 5px; border-top: 1px solid #F1F5F9; cursor: pointer; transition: background .1s; position: relative; display: flex; flex-direction: column; min-width: 0; }
.cell:hover { background: #F8FAFC; }
.cell.today { background: #EFF6FF; }
.cell.empty { cursor: default; background: #FAFAFA; }
.day-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--navy3); margin-bottom: 3px; }
.day-num.is-today { background: var(--blue); color: #fff; font-weight: 900; }
.day-num.is-sun { color: var(--red); }
.day-num.is-sat { color: var(--blue); }
.event-chip { border-radius: 5px; padding: 2px 6px; font-size: 11px; font-weight: 700; color: #fff; margin-bottom: 2px; cursor: pointer; display: flex; align-items: center; gap: 3px; width: 100%; max-width: 100%; }
.event-chip:hover { filter: brightness(1.15); }
.event-chip.completed { background: #94A3B8 !important; opacity: 0.85; text-decoration: line-through; }
.chip-author { font-size: 10px; opacity: .8; flex-shrink: 0; }
.more-badge { font-size: 10px; color: var(--muted); padding-left: 3px; }
.filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-chip { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; }
.filter-chip.active { border-color: currentColor; }
.list-item { background: var(--white); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 6px rgba(0,0,0,.06); margin-bottom: 10px; transition: box-shadow .15s; }
.list-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
.list-info { flex: 1; min-width: 0; }
.list-title { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-meta { font-size: 12px; color: var(--slate); margin-top: 3px; display: flex; align-items: center; gap: 8px; }
.author-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.cat-pill { padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 800; }
.legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.legend-item { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.loading-screen { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 16px; }
.loading-screen .logo { font-size: 48px; animation: pulse 1.2s ease-in-out infinite; }
.loading-screen p { color: var(--muted); font-size: 14px; text-align: center; line-height: 1.5; }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: .8; } 50% { transform: scale(1.1); opacity: 1; } }
.name-modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.name-modal { background: var(--white); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,.25); }
.name-modal .emoji { font-size: 48px; margin-bottom: 16px; }
.name-modal h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
.name-modal p { color: var(--slate); font-size: 14px; margin-bottom: 24px; }
.name-input { width: 100%; border: 2px solid var(--border); border-radius: 12px; padding: 13px 16px; font-size: 16px; font-family: inherit; outline: none; text-align: center; font-weight: 700; transition: border-color .2s; }
.name-input:focus { border-color: var(--blue); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); }
.modal { background: var(--white); border-radius: 22px; padding: 32px; width: 100%; max-width: 460px; box-shadow: 0 24px 60px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal-header h3 { font-size: 18px; font-weight: 900; }
.modal-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; color: var(--slate); }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 800; color: var(--slate); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .8px; }
.form-input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 13px; font-size: 14px; font-family: inherit; color: var(--navy); outline: none; background: #fff; transition: border-color .2s; }
.form-input:focus { border-color: var(--blue); }
.form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.alarm-box { background: #F8FAFC; border-radius: 12px; padding: 14px 16px; border: 1.5px solid var(--border); }
.alarm-toggle { display: flex; align-items: center; gap: 9px; cursor: pointer; font-weight: 700; font-size: 14px; }
.alarm-toggle input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--blue); cursor: pointer; }
.alarm-timing { display: flex; align-items: center; gap: 8px; margin-top: 11px; font-size: 13px; color: var(--slate); }
.alarm-timing select { width: auto; padding: 5px 10px; }
@media (max-width: 768px) {
  header { padding: 0 14px; height: 56px; flex-wrap: wrap; }
  .header-brand h1 { font-size: 15px; }
  .header-brand p { display: none; }
  .header-right { gap: 5px; }
  main { padding: 14px 8px 32px; }
  .cal-nav h2 { font-size: 20px; }
  .cell { min-height: 60px; padding: 4px 2px; }
  .event-chip { font-size: 10px; padding: 1px 3px; margin-bottom: 1px; }
  .chip-author { display: none; }
  .modal { padding: 22px 18px; }
  .form-row2 { grid-template-columns: 1fr; }
  .filter-bar { gap: 5px; }
  .filter-chip { font-size: 11px; padding: 4px 10px; }
  .btn-arrow { width: 34px; height: 34px; }
  .day-header { font-size: 11px; padding: 10px 0; }
  .legend { gap: 5px; }
  .legend-item { font-size: 10px; padding: 3px 8px; }
}
</style>
</head>
<body>

<input type="file" id="excelUpload" accept=".xlsx, .xls, .xlsm" style="display:none" onchange="handleExcelUpload(event)">

<div class="loading-screen" id="loadingScreen">
  <div class="logo">📅</div>
  <p id="loadingText">온메디칼 캘린더 불러오는 중...</p>
</div>

<div class="name-modal-wrap" id="nameModal" style="display:none">
  <div class="name-modal">
    <div class="emoji">👋</div>
    <h2>처음 오셨군요!</h2>
    <p>캘린더에서 사용할 이름을 입력해주세요.<br>팀원들에게 표시됩니다.</p>
    <input class="name-input" id="nameInput" placeholder="홍길동" maxlength="10" />
    <button class="btn btn-primary" style="width:100%;margin-top:16px;padding:14px;font-size:16px" onclick="submitName()">시작하기</button>
  </div>
</div>

<div id="toasts"></div>

<header>
  <div class="header-brand">
    <span class="icon">📅</span>
    <div>
      <h1>온메디칼 캘린더</h1>
      <p>팀 공유 일정 관리</p>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="document.getElementById('excelUpload').click()" style="font-size:12px; padding:6px 10px; background:#ECFEFF; color:#0E7490; border-color:#A5F3FC;">📥 엑셀 업로드</button>
    <button class="btn btn-ghost" onclick="syncHolidays()" style="font-size:12px; padding:6px 10px; background:#FFFBEB; color:#B45309; border-color:#FDE68A;">🔄 휴일 자동수집</button>
    <button class="btn btn-ghost" id="viewToggleBtn" onclick="toggleView()" style="font-size:12px; padding:6px 10px;">📋 목록</button>
    <div class="user-chip" onclick="changeName()" title="이름 변경">
      <span>👤</span>
      <span id="userNameDisplay">...</span>
      <span style="color:var(--muted);font-weight:400;font-size:11px">변경</span>
    </div>
  </div>
</header>

<main>
  <div id="calView">
    <div class="cal-nav">
      <button class="btn-arrow" onclick="changeMonth(-1)">‹</button>
      <div style="text-align:center"><h2 id="monthTitle"></h2><p style="font-size:12px;color:#94A3B8;margin-top:4px">📌 날짜를 클릭하면 일정 추가</p><button onclick="goToday()" style="margin-top:6px;background:#EFF6FF;color:#3B82F6;border:1.5px solid #BFDBFE;border-radius:20px;padding:3px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">오늘</button></div>
      <button class="btn-arrow" onclick="changeMonth(1)">›</button>
    </div>

    <div class="filter-bar" id="filterBar"></div>

    <div class="calendar">
      <div class="day-headers">
        <div class="day-header sun">SUN</div>
        <div class="day-header">MON</div>
        <div class="day-header">TUE</div>
        <div class="day-header">WED</div>
        <div class="day-header">THU</div>
        <div class="day-header">FRI</div>
        <div class="day-header sat">SAT</div>
      </div>
      <div class="cells" id="cells"></div>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div id="listView" style="display:none">
    <div class="cal-nav">
      <button class="btn-arrow" onclick="changeMonth(-1)">‹</button>
      <div style="text-align:center">
        <h2 id="listMonthTitle" style="font-size: 22px;"></h2>
        <div style="display:flex; justify-content:center; gap:8px; margin-top:6px;">
            <button id="listModeBtn" onclick="toggleListMode()" style="background:#F1F5F9;color:#64748B;border:1.5px solid #E2E8F0;border-radius:20px;padding:3px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🗓 연간 보기</button>
            <button onclick="goToday()" style="background:#EFF6FF;color:#3B82F6;border:1.5px solid #BFDBFE;border-radius:20px;padding:3px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">오늘</button>
        </div>
      </div>
      <button class="btn-arrow" onclick="changeMonth(1)">›</button>
    </div>
    <div id="listItems"></div>
  </div>
</main>


<div class="overlay" id="dayOverlay" style="display:none" onclick="if(event.target===this)document.getElementById('dayOverlay').style.display='none'">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h3 id="dayModalTitle">📅 일정 목록</h3>
      <button class="modal-close" onclick="document.getElementById('dayOverlay').style.display='none'">✕</button>
    </div>
    <div id="dayModalList" style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto"></div>
    <button class="btn btn-primary" id="dayAddBtn" style="width:100%;margin-top:16px;padding:13px;font-size:14px">+ 이 날 일정 추가</button>
  </div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">➕ 일정 추가</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    
    <div class="form-group">
      <label class="form-label">제목 *</label>
      <input class="form-input" id="fTitle" placeholder="일정 제목" />
    </div>

    <div class="form-row2 form-group">
      <div>
        <label class="form-label">시작 날짜 *</label>
        <input class="form-input" type="date" id="fDate" />
      </div>
      <div>
        <label class="form-label">종료 날짜 <span style="font-weight:400;color:#94A3B8">(기간)</span></label>
        <input class="form-input" type="date" id="fEndDate" />
      </div>
    </div>
    
    <div class="form-row2 form-group">
      <div>
        <label class="form-label">시간 <span style="font-weight:400;color:#94A3B8">(선택)</span></label>
        <input class="form-input" type="time" id="fTime" />
      </div>
      <div>
        <label class="form-label">카테고리</label>
        <select class="form-input" id="fCategory">
          <option value="remittance">💸 송금</option>
          <option value="departure">🚢 출항</option>
          <option value="arrival">⚓ 입항</option>
          <option value="container">📦 컨테이너입고</option>
          <option value="gmp">🔬 GMP</option>
          <option value="production">🏭 생산완료</option>
          <option value="biz_trip">💼 출장</option>
          <option value="vacation">🟡 휴가</option>
          <option value="other">⚪ 기타</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">메모</label>
      <textarea class="form-input" id="fDesc" rows="2" placeholder="추가 설명 (선택)" style="resize:vertical"></textarea>
    </div>
    
    <div class="form-group alarm-box" style="margin-bottom:10px">
      <label class="alarm-toggle">
        <input type="checkbox" id="fRepeat" onchange="toggleRepeatUI()" />
        🔁 반복 설정
      </label>
      <div id="repeatRow" style="display:none;margin-top:12px;flex-direction:column;gap:10px">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select class="form-input" id="fRepeatType" style="width:auto;padding:5px 10px" onchange="toggleRepeatUI()">
            <option value="daily">매일</option>
            <option value="weekly">매주</option>
            <option value="weekday">특정 요일</option>
            <option value="monthly">매월</option>
            <option value="yearly">매년</option>
          </select>
        </div>
        <div id="weekdayRow" style="display:none;gap:6px;flex-wrap:wrap">
          <label style="font-size:12px;font-weight:700;color:#64748B;width:100%;margin-bottom:2px">반복 요일 선택</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="0" style="accent-color:#EF4444"> 일</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="1"> 월</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="2"> 화</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="3"> 수</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="4"> 목</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="5" style="accent-color:#3B82F6"> 금</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="6" style="accent-color:#3B82F6"> 토</label>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#64748B">
          <span>종료일</span>
          <input class="form-input" type="date" id="fRepeatEnd" style="width:auto;padding:5px 10px" />
          <span style="font-size:11px;color:#94A3B8">미입력 시 무기한</span>
        </div>
      </div>
    </div>
    
    <div class="form-group alarm-box">
      <label class="alarm-toggle">
        <input type="checkbox" id="fAlarm" onchange="toggleAlarmUI()" />
        🔔 알람 설정 <span style="font-size:11px;color:var(--slate);font-weight:400">(시간 지정 시에만 울림)</span>
      </label>
      <div class="alarm-timing" id="alarmTimingRow" style="display:none;">
        <span>시작</span>
        <select class="form-input" id="fAlarmMin" style="width:auto;padding:5px 10px">
          <option value="5">5분 전</option>
          <option value="10" selected>10분 전</option>
          <option value="15">15분 전</option>
          <option value="30">30분 전</option>
          <option value="60">1시간 전</option>
          <option value="120">2시간 전</option>
          <option value="360">6시간 전</option>
          <option value="1440">1일 전</option>
          <option value="2880">2일 전</option>
          <option value="4320">3일 전</option>
          <option value="7200">5일 전</option>
          <option value="10080">1주일 전</option>
        </select>
        <span>에 알림</span>
      </div>
    </div>
    
    <div style="display:flex; flex-direction:column; gap:8px; margin-top:24px;">
      <div id="modalActionTop" style="display:none; gap:8px; width:100%;">
        <button class="btn btn-danger-soft" id="deleteBtn" style="display:none; flex:1; padding:12px 0;" onclick="deleteCurrentEvent()">삭제</button>
        <button class="btn" id="stopRepeatBtn" style="display:none; flex:1; padding:12px 0; background:#FFF7ED; color:#EA580C; border:1px solid #FED7AA;" onclick="stopRepeatFromHere()">🔁 중단</button>

window.handleExcelUpload = async function(event) {
    const file = event.target.files[0];
    if (!file) return;

    document.getElementById("loadingScreen").style.display = "flex";
    document.querySelector("#loadingText").textContent = "엑셀 데이터를 분석하여 등록 중입니다...";

    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});

            const sheetName = workbook.SheetNames.includes("일정관리") ? "일정관리" : workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];

            const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: "A", raw: true, defval: ""});

            let newCount = 0;
            let skipCount = 0;

            function parseExcelDate(val) {
                if (!val) return null;
                if (typeof val === 'number') {
                    const date = new Date(Math.round((val - 25569) * 86400 * 1000));
                    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                }
                let dStr = String(val).trim().replace(/[\.\/]/g, '-').replace(/\s/g, '');
                if (dStr.endsWith('-')) dStr = dStr.slice(0, -1);
                const match = dStr.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
                if (match) return `${match[1]}-${match[2].padStart(2, '0')}-${match[3].padStart(2, '0')}`;
                return null;
            }

            async function processExcelRow(dateVal, titleVal) {
                const cleanDate = parseExcelDate(dateVal);
                const originalTitle = String(titleVal).trim();
                
                if (!cleanDate || !originalTitle) return;

                let cleanTitle = originalTitle;
                let memoText = "";

                const priceMatch = originalTitle.match(/(.*?)(?:\s*지급일)?\s*(\$[0-9,.]+)/);
                if (priceMatch) {
                    cleanTitle = priceMatch[1].trim(); 
                    memoText = priceMatch[2].trim();   
                }

                const exists = events.find(ev => ev.date === cleanDate && ev.title === cleanTitle);
                if (exists) {
                    skipCount++;
                    return;
                }

                let category = "other";
                if (originalTitle.includes("출항") || originalTitle.toUpperCase().includes("ETD")) category = "departure";
                else if (originalTitle.includes("입항") || originalTitle.toUpperCase().includes("ETA")) category = "arrival";
                else if (originalTitle.includes("입고")) category = "container";
                else if (originalTitle.includes("생산완료")) category = "production";
                else if (originalTitle.includes("잔금") || originalTitle.includes("선수금") || originalTitle.includes("지급") || originalTitle.includes("송금") || originalTitle.includes("$")) category = "remittance";

                const newEvent = {
                    title: cleanTitle,
                    date: cleanDate,
                    endDate: null,
                    time: "",
                    category: category,
                    description: memoText, 
                    alarm: false,
                    alarmMinutes: 10,
                    author: currentUser,
                    repeatMaster: false,
                    isCompleted: false,
                    createdAt: serverTimestamp()
                };

                await addDoc(eventsCol, newEvent);
                newCount++;
            }

            for (let i = 1; i < jsonData.length; i++) {
                const row = jsonData[i];
                await processExcelRow(row["J"], row["L"]); 
                await processExcelRow(row["W"], row["X"]); 
            }

            document.getElementById("loadingScreen").style.display = "none";
            addToast(`✅ 엑셀 업로드 완료! (추가: ${newCount}개 / 중복제외: ${skipCount}개)`, "success");

            document.getElementById('excelUpload').value = '';

        } catch (error) {
            console.error(error);
            alert("엑셀 파일을 처리하는 중 오류가 발생했습니다. 파일이 열려있다면 닫고 올려주세요.");
            document.getElementById("loadingScreen").style.display = "none";
        }
    };
    reader.readAsArrayBuffer(file);
};

window.syncHolidays = async function() {
  const year = prompt("자동으로 불러올 연도를 입력하세요 (예: 2026)", currentYear);
  if (!year) return;

  const krApiKey = "Fc622d1df47731ef7f69d7e1b0ef44b69810e80166c6783ef467c49e469b7bbc";

  document.getElementById("loadingScreen").style.display = "flex";
  document.querySelector("#loadingText").textContent = `${year}년 공휴일을 긁어오는 중입니다...`;

  for (const c of cCodes) {
    try {
      const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/${c}`);
      const data = await res.json();
      data.forEach(h => {
        let kName = holMap[h.name] || h.name;
        if (h.name.includes("Chinese New Year")) kName = "춘절";
        fetched.push({ title: kName, date: h.date, category: "holiday", country: c.toLowerCase(), isHoliday: true });
      });
    } catch(e) { console.log(e); }
  }

  try {
    const url = `http://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getRestDeInfo?solYear=${year}&numOfRows=100&ServiceKey=${krApiKey}&_type=json`;
    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    let items = data.response?.body?.items?.item || [];
    if (!Array.isArray(items)) items = [items];
    items.forEach(h => {
      if(h.isHoliday === "Y") {
        const dStr = String(h.locdate).replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
        fetched.push({ title: h.dateName, date: dStr, category: "holiday", country: "kr", isHoliday: true });
      }
    });
  } catch(e) { console.log(e); }

  let newCount = 0;
  for (const h of fetched) {
    const exists = events.find(e => e.isHoliday && e.date === h.date && e.country === h.country && e.title === h.title);
    if (!exists) {
      await addDoc(eventsCol, { ...h, createdAt: serverTimestamp() });
      newCount++;
    }
  }

  document.getElementById("loadingScreen").style.display = "none";
  addToast(`✅ ${year}년 공휴일 ${newCount}개 자동 연동 완료!`, "success");

function startAlarmLoop() {
  requestNotifPermission();
  setInterval(checkAlarms, 30000);
  checkAlarms();
}

function checkAlarms() {
  const now = new Date();
  events.forEach(ev => {
    if (!ev.alarm || ev.isCompleted || !ev.time || ev.isHoliday) return;
    const alarmKey = `${ev.id}_${currentUser}`;
    if (firedAlarms[alarmKey]) return;
    const evTime = new Date(`${ev.date}T${ev.time}:00`);
    const diffMin = (evTime - now) / 60000;
    if (diffMin <= (ev.alarmMinutes || 10) && diffMin > -2) {
      const minLabel = diffMin <= 0 ? "지금!" : `${Math.ceil(diffMin)}분 후`;
      const safeLabel = CATS[ev.category] ? CATS[ev.category].label : "일정";
      addToast(`🔔 [${safeLabel}] ${ev.title} — ${minLabel}`, "alarm");
      if (Notification.permission === "granted") {
        new Notification("📅 온메디칼 캘린더 알림", { body: `${ev.title}\n${ev.date} ${ev.time} (${minLabel})\n등록자: ${ev.author}`, icon: "https://cdn-icons-png.flaticon.com/512/747/747310.png" });
      }
      firedAlarms[alarmKey] = true;
      localStorage.setItem("firedAlarms", JSON.stringify(firedAlarms));
    }
  });
}

function requestNotifPermission() { if ("Notification" in window && Notification.permission === "default") Notification.requestPermission(); }

    authors.map(a => `<span class="filter-chip ${activeFilter===a?"active":""}" style="background:${userColor(a)}22;color:${userColor(a)}" onclick="setFilter('${a}')"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${userColor(a)};margin-right:4px"></span>${a}</span>`).join("");
}

function getDisplayTitle(ev) {
    let displayTitle = ev.title;
    if (ev.endDate && ev.endDate > ev.date) {
        const oStart = ev.origDate || ev.date;
        const oEnd = ev.origEndDate || ev.endDate;
        const sm = oStart.slice(5,7), sd = oStart.slice(8,10);
        const em = oEnd.slice(5,7), ed = oEnd.slice(8,10);
        const rangeStr = (sm === em) ? `${sd}~${ed}` : `${sm}/${sd}~${em}/${ed}`;
        displayTitle = `${rangeStr} ${ev.title}`;
    }
    return displayTitle;
}

function filteredEvents(periodStart, periodEnd, isListView = false) {
  const base = activeFilter === "all" ? events : events.filter(e => e.author === activeFilter);
  const expanded = [];

  base.forEach(ev => {
    if (ev.isHoliday) return; 

    let startDates = ev.repeatMaster ? expandRepeatForMonth(ev, periodStart, periodEnd) : [ev.date];

    startDates.forEach(sDate => {
      if (ev.isCompleted) {
        if (sDate >= periodStart && sDate <= periodEnd) expanded.push({ ...ev, date: sDate, _virtual: ev.repeatMaster });
      } else if (ev.endDate && ev.endDate > ev.date) {
        if (isListView) {
           if (sDate <= periodEnd && ev.endDate >= periodStart) expanded.push({ ...ev, date: sDate, _isRange: true });
        } else {
           const origStart = new Date(ev.date + "T00:00:00"), origEnd = new Date(ev.endDate + "T00:00:00");
           const durationDays = Math.round((origEnd - origStart) / 86400000);
           let cur = new Date(sDate + "T00:00:00"), end = new Date(sDate + "T00:00:00");
           end.setDate(end.getDate() + durationDays);
           const formattedEnd = toLocalISO(end);

           while (cur <= end) {
             const dStr = toLocalISO(cur);
             const isHol = !!getDynamicHolidays(dStr).kr;
             if (dStr >= periodStart && dStr <= periodEnd && !isHol) {
               expanded.push({ ...ev, date: dStr, origDate: sDate, origEndDate: formattedEnd, _virtual: ev.repeatMaster, _multiDay: true });
             }
             cur.setDate(cur.getDate() + 1);
           }
        }
      } else {
        if (sDate >= periodStart && sDate <= periodEnd) expanded.push({ ...ev, date: sDate, _virtual: ev.repeatMaster });
      }
    });
  });
  return expanded;
}

function expandRepeatForMonth(ev, periodStart, periodEnd) {
  const type = ev.repeatType, days = ev.repeatDays || [], start = ev.date, end = ev.repeatEnd || "2099-12-31";
  const results = [];
  let durationDays = ev.endDate && ev.endDate > ev.date ? Math.round((new Date(ev.endDate + "T00:00:00") - new Date(ev.date + "T00:00:00")) / 86400000) : 0;

  let loopStart = new Date(periodStart + "T00:00:00");
  loopStart.setDate(loopStart.getDate() - durationDays);
  let cur = new Date(toLocalISO(loopStart) + "T00:00:00");
  const mEnd = new Date(periodEnd + "T00:00:00");

  while (cur <= mEnd) {
    const dateStr = toLocalISO(cur);
    if (dateStr < start || dateStr > end) { cur.setDate(cur.getDate()+1); continue; }
    const dow = cur.getDay();

    let match = false;
    if (type === "daily") match = true;
    else if (type === "weekly") match = new Date(start + "T00:00:00").getDay() === dow;
    else if (type === "weekday") match = days.includes(dow);
    else if (type === "monthly") match = new Date(start + "T00:00:00").getDate() === cur.getDate();
    else if (type === "yearly") match = start.slice(5) === dateStr.slice(5);

    const excluded = (ev.repeatExclude || []).includes(dateStr);
    const isHol = !!getDynamicHolidays(dateStr).kr;

    if (match && !excluded && !isHol) results.push(dateStr);
    cur.setDate(cur.getDate()+1);
  }
  return results;
}

function renderCells() {
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const container = document.getElementById("cells");
  container.innerHTML = "";

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement("div"); el.className = "cell empty"; container.appendChild(el);
  }
  
  const monthStart = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-01`;
  const monthEnd = toLocalISO(new Date(currentYear, currentMonth+1, 0));
  const evsToRender = filteredEvents(monthStart, monthEnd, false);

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday = d === new Date().getDate() && currentMonth === new Date().getMonth() && currentYear === new Date().getFullYear();
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const dayEvs = evsToRender.filter(e => e.date === dateStr).sort((a, b) => (a.time || "") > (b.time || "") ? 1 : -1);

    const cell = document.createElement("div");
    cell.className = "cell" + (isToday ? " today" : "");
    cell.onclick = () => dayEvs.length > 0 ? openDayModal(dateStr, dayEvs) : openAddModal(dateStr);

    const dynHol = getDynamicHolidays(dateStr);
    if (dynHol.kr) cell.style.background = isToday ? "#FEF3C7" : (dynHol.isSub ? "#FFF7ED" : "#FFFBEB");

    const cellTop = document.createElement("div");
    cellTop.style.flex = "1";
    cellTop.style.minWidth = "0";

    const numEl = document.createElement("div");
    const isRed = dow===0 || (dynHol.kr && !dynHol.isSub);
    numEl.className = "day-num" + (isToday ? " is-today" : "") + (isRed && !isToday ? " is-sun" : (!isRed && dow===6 && !isToday && !dynHol.isSub ? " is-sat" : ""));
    if (dynHol.isSub && !isToday) numEl.style.color = "#EA580C";
    numEl.textContent = d;
    cellTop.appendChild(numEl);

    if (dynHol.kr) {
      const hEl = document.createElement("div");
      hEl.style.cssText = `font-size:10px;color:${dynHol.isSub?"#EA580C":"#B45309"};font-weight:700;padding:0 2px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`;
      hEl.textContent = (dynHol.isSub ? "🔄 " : "") + dynHol.kr;
      cellTop.appendChild(hEl);
    }

    dayEvs.slice(0, 3).forEach(ev => {
      const chip = document.createElement("div");
      chip.className = "event-chip";
      if (ev.isCompleted) chip.classList.add("completed"); else chip.style.background = CATS[ev.category]?.bg || "#94A3B8";
      chip.title = `${ev.title} (${ev.author})`;
      const iconStr = ev.isCompleted ? "✅ " : (ev.alarm && ev.time ? "🔔" : "");
      const repeatIcon = (!ev.isCompleted && ev.repeatGroupId) ? "🔁" : "";
      const timeStr = ev.time ? ev.time + ' ' : '';
      
      chip.innerHTML = `<span style="flex-shrink:0">${iconStr}${repeatIcon}</span><span style="flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${timeStr}${ev.title}</span><span class="chip-author" style="background:rgba(255,255,255,.25);border-radius:4px;padding:0 3px; flex-shrink:0;">${ev.author || ""}</span>`;
      chip.onclick = e => { e.stopPropagation(); openEditModal(ev); };
      cellTop.appendChild(chip);
    });
    
    if (dayEvs.length > 3) {
      const more = document.createElement("div");
      more.style.cssText = "cursor:pointer;color:#3B82F6;font-weight:700;font-size:11px;padding:1px 3px;";
      more.textContent = `+${dayEvs.length - 3}개 더 보기`;
      more.onclick = e => { e.stopPropagation(); openDayModal(dateStr, dayEvs); };
      cellTop.appendChild(more);
    }
    cell.appendChild(cellTop);

    if (dynHol.foreign.length > 0) {
      const cellBottom = document.createElement("div");
      const groupedHols = {};
      dynHol.foreign.forEach(fh => { if (!groupedHols[fh.n]) groupedHols[fh.n] = []; groupedHols[fh.n].push(fh.c); });
      Object.entries(groupedHols).forEach(([hName, countries]) => {
        const fEl = document.createElement("div");
        fEl.style.cssText = "font-size:9px;color:#64748B;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;margin-top:1px;";
        fEl.innerHTML = countries.map(c => `<img src="https://flagcdn.com/16x12/${c}.png" style="width:12px;height:9px;margin-right:2px;border-radius:1px;">`).join("") + `<span style="margin-left:1px;">${hName}</span>`;
        cellBottom.appendChild(fEl);
      });
      cell.appendChild(cellBottom);
    }
    container.appendChild(cell);
  }
  document.getElementById("legend").innerHTML = Object.entries(CATS).map(([,c]) => `<span class="legend-item" style="background:${c.light};color:${c.text}">● ${c.label}</span>`).join("");
}

        dateBoxHtml = `<div style="font-size:11px;color:#94A3B8;font-weight:700">${["일","월","화","수","목","금","토"][dateObj.getDay()]}</div><div style="font-size:${listMode==="year"?"18px":"22px"};font-weight:900;color:${dateObj.getDay()===0?"#EF4444":dateObj.getDay()===6?"#3B82F6":"#1E293B"};line-height:1.1">${listMode==="year"?parseInt(ev.date.slice(5,7),10)+"/"+parseInt(ev.date.slice(8,10),10):parseInt(ev.date.slice(8,10),10)}</div>`;
    }
    
    return `
      <div class="list-item" style="border-left:4px solid ${isComp ? '#94A3B8' : c.bg};opacity:${past||isComp?0.55:1}">
        <div style="text-align:center;min-width:48px;">${dateBoxHtml}</div>
        <div class="list-info">
          <div class="list-title" style="${isComp ? 'text-decoration:line-through;color:#94A3B8;' : ''}">${isComp?"✅ ":(ev.alarm && ev.time ?"🔔 ":"")}${ev.title}</div>
          <div class="list-meta">${ev.time ? `<span>${ev.time}</span>` : ''}<span style="display:flex;align-items:center;gap:4px"><span class="author-dot" style="background:${uc}"></span>${ev.author || "?"}</span>${ev.description ? `<span style="color:var(--muted)">${ev.description}</span>` : ""}</div>
        </div>
        <span class="cat-pill" style="background:${isComp ? '#F1F5F9' : c.light};color:${isComp ? '#64748B' : c.text}">${c.label}</span>
        <button class="btn btn-ghost" style="flex:0;padding:6px 12px;font-size:12px" onclick='openEditModal(${JSON.stringify(ev).replace(/'/g,"&apos;")})'>수정</button>
      </div>`;
  }).join("");
}

window.markCompleted = async function() {
  const ev = events.find(e => e.id === editingId); if(!ev) return;
  const compDate = prompt("✅ 일정을 완료 처리합니다.\n최종 완료로 달력에 기록될 날짜를 입력해주세요:", currentEditDate);
  if(!compDate) return;
  if (!/^\d{4}-\d{2}-\d{2}$/.test(compDate)) { addToast("올바른 날짜 형식(YYYY-MM-DD)이 아닙니다.", "error"); return; }
  try {
    if (ev.repeatMaster) {
      const excludes = ev.repeatExclude || []; if (!excludes.includes(currentEditDate)) excludes.push(currentEditDate);
      await updateDoc(doc(db, "events", editingId), { repeatExclude: excludes });
      const newEv = { ...ev }; delete newEv.id; delete newEv.repeatMaster; delete newEv.repeatType; delete newEv.repeatEnd; delete newEv.repeatDays; delete newEv.repeatGroupId; delete newEv.repeatExclude;
      newEv.date = compDate; newEv.endDate = null; newEv.isCompleted = true; newEv.createdAt = serverTimestamp();
      await addDoc(eventsCol, newEv);
    } else {
      await updateDoc(doc(db, "events", editingId), { date: compDate, endDate: null, isCompleted: true });
    }
    addToast("✅ 완료 처리되었습니다.", "success"); closeModal();
  } catch(e) { addToast("오류: " + e.message, "error"); }
};

window.stopRepeatFromHere = async function() {
  if (!confirm("이 날짜 이후 반복 일정을 모두 삭제합니다.\n이 일정은 유지됩니다.")) return;
  const ev = events.find(e => e.id === editingId); if (!ev || !ev.repeatGroupId) return;
  try {
    const targets = events.filter(e => e.repeatGroupId === ev.repeatGroupId && e.date > ev.date);

    addToast(`이후 반복 일정 ${targets.length}개가 종료되었습니다.`, "success"); closeModal();

};

window.saveEvent = async function() {
  const title = document.getElementById("fTitle").value.trim(), date = document.getElementById("fDate").value;
  let endDate = document.getElementById("fEndDate").value;
  const time = document.getElementById("fTime").value || "";
  if (!title || !date) { addToast("제목과 날짜를 입력해주세요.", "error"); return; }
  if (endDate && endDate < date) { addToast("종료 날짜는 시작 날짜 이후여야 합니다.", "error"); return; }
  if (endDate === date) endDate = "";

  const data = { title, date, time, category: document.getElementById("fCategory").value, description: document.getElementById("fDesc").value, alarm: document.getElementById("fAlarm").checked, alarmMinutes: Number(document.getElementById("fAlarmMin").value), author: currentUser, updatedAt: serverTimestamp() };
  const isRepeat = document.getElementById("fRepeat").checked;
  
  if (isRepeat) {
    const rType = document.getElementById("fRepeatType").value, rDays = rType === "weekday" ? [...document.querySelectorAll(".dow-check:checked")].map(c => Number(c.value)) : [];
    if (rType === "weekday" && rDays.length === 0) { addToast("반복 요일을 선택해주세요.", "error"); return; }
    Object.assign(data, { repeatType: rType, repeatEnd: document.getElementById("fRepeatEnd").value || null, repeatDays: rDays, repeatGroupId: editingId || ("rg_" + Date.now()), repeatStopped: false, repeatMaster: true, endDate: endDate || null });
  } else {
    Object.assign(data, { repeatMaster: false, repeatType: null, repeatEnd: null, repeatDays: null, repeatGroupId: null, endDate: endDate || null });
  }

  try {
    if (editingId) { await updateDoc(doc(db, "events", editingId), data); addToast("수정 완료.", "success"); } 
    else { data.createdAt = serverTimestamp(); await addDoc(eventsCol, data); addToast("추가 완료.", "success"); }
    closeModal();
  } catch(e) { addToast("오류: " + e.message, "error"); }
};

window.deleteCurrentEvent = async function() {
  const ev = events.find(e => e.id === editingId);
  if (ev && ev.repeatMaster) {
    if (confirm("반복 일정입니다.\n[확인] 전체 삭제\n[취소] 이 날만 유지")) {
      try { await deleteDoc(doc(db, "events", ev.id)); addToast("전체 삭제됨.", "success"); closeModal(); } catch(e) {} return;
    } else {
      try { const ex = ev.repeatExclude || []; if (!ex.includes(currentEditDate)) ex.push(currentEditDate); await updateDoc(doc(db, "events", ev.id), { repeatExclude: ex }); addToast("이 날만 제외됨.", "success"); closeModal(); } catch(e) {} return;
    }
  } else {
    if (!confirm("정말 삭제하시겠습니까?")) return;
  }
  try { await deleteDoc(doc(db, "events", editingId)); addToast("삭제 완료.", "success"); closeModal(); } catch(e) {}
};

window.goToday = function() { currentYear = today.getFullYear(); currentMonth = today.getMonth(); renderAll(); };
window.changeMonth = function(dir) {
  if (currentView === "list" && listMode === "year") currentYear += dir;
  else { currentMonth += dir; if (currentMonth < 0) { currentYear--; currentMonth = 11; } if (currentMonth > 11) { currentYear++; currentMonth = 0; } }
  renderAll();
};
window.toggleView = function() { currentView = currentView === "cal" ? "list" : "cal"; document.getElementById("calView").style.display = currentView === "cal" ? "" : "none"; document.getElementById("listView").style.display = currentView === "list" ? "" : "none"; document.getElementById("viewToggleBtn").textContent = currentView === "cal" ? "📋 목록" : "📅 달력"; renderAll(); };
function addToast(msg, type = "info") { const el = document.createElement("div"); el.className = `toast ${type}`; el.textContent = msg; document.getElementById("toasts").appendChild(el); setTimeout(() => el.remove(), 5000); }
initFirebase();

(function() {
  let startX = 0, startY = 0;
  document.addEventListener("touchstart", e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener("touchend", e => { const dx = e.changedTouches[0].clientX - startX; const dy = e.changedTouches[0].clientY - startY; if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) changeMonth(dx < 0 ? 1 : -1); }, { passive: true });
})();
</script>
</body>
