<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>사내 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0F172A;
  --navy2: #1E293B;
  --navy3: #334155;
  --slate: #64748B;
  --muted: #94A3B8;
  --border: #E2E8F0;
  --bg: #F1F5F9;
  --white: #FFFFFF;
  --blue: #3B82F6;
  --red: #EF4444;
  --green: #10B981;
  --yellow: #F59E0B;
  --purple: #8B5CF6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; }

/* ── 토스트 ── */
#toasts { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--navy2); color: #fff; padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 24px rgba(0,0,0,.25); max-width: 340px; animation: slideIn .3s ease; }
.toast.alarm { border-left: 4px solid var(--yellow); background: #1C1917; }
.toast.success { background: #064E3B; }
.toast.error { background: #7F1D1D; }
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

/* ── 헤더 ── */
header { background: var(--navy); color: #fff; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 16px rgba(0,0,0,.2); position: sticky; top: 0; z-index: 100; }
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-brand .icon { font-size: 24px; }
.header-brand h1 { font-size: 18px; font-weight: 900; letter-spacing: -.5px; }
.header-brand p { font-size: 11px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.user-chip { background: var(--navy3); color: #fff; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; cursor: pointer; border: 1px solid #475569; }
.user-chip:hover { background: #475569; }

/* ── 버튼 ── */
.btn { border: none; border-radius: 10px; padding: 8px 16px; cursor: pointer; font-weight: 700; font-size: 13px; font-family: inherit; transition: all .15s; }
.btn:hover { filter: brightness(1.1); }
.btn-ghost { background: var(--white); border: 1.5px solid var(--border); color: var(--slate); }
.btn-primary { background: var(--blue); color: #fff; }
.btn-danger-soft { background: #FEF2F2; color: var(--red); }
.btn-arrow { background: var(--white); border: 1.5px solid var(--border); color: var(--slate); width: 38px; height: 38px; font-size: 18px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.btn-arrow:hover { background: var(--bg); }

/* ── 메인 레이아웃 ── */
main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 40px; }

/* ── 네비 ── */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.cal-nav h2 { font-size: 26px; font-weight: 900; letter-spacing: -1px; color: var(--navy); }
.cal-nav-right { display: flex; gap: 8px; }

/* ── 캘린더 그리드 ── */
.calendar { background: var(--white); border-radius: 20px; box-shadow: 0 2px 20px rgba(0,0,0,.07); overflow: hidden; }
.day-headers { display: grid; grid-template-columns: repeat(7,1fr); background: #F8FAFC; border-bottom: 1.5px solid var(--border); }
.day-header { text-align: center; padding: 13px 0; font-size: 12px; font-weight: 800; color: var(--slate); letter-spacing: .5px; }
.day-header.sun { color: var(--red); }
.day-header.sat { color: var(--blue); }
.cells { display: grid; grid-template-columns: repeat(7,1fr); }
.cell { min-height: 96px; padding: 7px 5px; border-top: 1px solid #F1F5F9; cursor: pointer; transition: background .1s; position: relative; }
.cell:hover .cell-inner { opacity: 1; }
.cell:hover { background: #F8FAFC; }
.cell.today { background: #EFF6FF; }
.cell.empty { cursor: default; background: #FAFAFA; }
.day-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--navy3); margin-bottom: 3px; }
.day-num.is-today { background: var(--blue); color: #fff; font-weight: 900; }
.day-num.is-sun { color: var(--red); }
.day-num.is-sat { color: var(--blue); }
.event-chip { border-radius: 5px; padding: 2px 6px; font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; cursor: pointer; display: flex; align-items: center; gap: 3px; }
.event-chip:hover { filter: brightness(1.15); }
.chip-author { font-size: 10px; opacity: .8; flex-shrink: 0; }
.more-badge { font-size: 10px; color: var(--muted); padding-left: 3px; }

/* ── 필터 바 ── */
.filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-chip { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; }
.filter-chip.active { border-color: currentColor; }

/* ── 목록 뷰 ── */
.list-item { background: var(--white); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 6px rgba(0,0,0,.06); margin-bottom: 10px; transition: box-shadow .15s; }
.list-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
.list-info { flex: 1; min-width: 0; }
.list-title { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-meta { font-size: 12px; color: var(--slate); margin-top: 3px; display: flex; align-items: center; gap: 8px; }
.author-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.cat-pill { padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 800; }

/* ── 범례 ── */
.legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.legend-item { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }

/* ── 로딩 ── */
.loading-screen { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 16px; }
.loading-screen .logo { font-size: 48px; animation: pulse 1.2s ease-in-out infinite; }
.loading-screen p { color: var(--muted); font-size: 14px; }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: .8; } 50% { transform: scale(1.1); opacity: 1; } }

/* ── 이름 입력 모달 ── */
.name-modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.name-modal { background: var(--white); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,.25); }
.name-modal .emoji { font-size: 48px; margin-bottom: 16px; }
.name-modal h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
.name-modal p { color: var(--slate); font-size: 14px; margin-bottom: 24px; }
.name-input { width: 100%; border: 2px solid var(--border); border-radius: 12px; padding: 13px 16px; font-size: 16px; font-family: inherit; outline: none; text-align: center; font-weight: 700; transition: border-color .2s; }
.name-input:focus { border-color: var(--blue); }

/* ── 이벤트 모달 ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); }
.modal { background: var(--white); border-radius: 22px; padding: 32px; width: 100%; max-width: 460px; box-shadow: 0 24px 60px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal-header h3 { font-size: 18px; font-weight: 900; }
.modal-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; color: var(--slate); }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 800; color: var(--slate); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .8px; }
.form-input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 13px; font-size: 14px; font-family: inherit; color: var(--navy); outline: none; background: #fff; transition: border-color .2s; }
.form-input:focus { border-color: var(--blue); }
.form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.alarm-box { background: #F8FAFC; border-radius: 12px; padding: 14px 16px; border: 1.5px solid var(--border); }
.alarm-toggle { display: flex; align-items: center; gap: 9px; cursor: pointer; font-weight: 700; font-size: 14px; }
.alarm-toggle input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--blue); cursor: pointer; }
.alarm-timing { display: flex; align-items: center; gap: 8px; margin-top: 11px; font-size: 13px; color: var(--slate); }
.alarm-timing select { width: auto; padding: 5px 10px; }
.modal-actions { display: flex; gap: 8px; margin-top: 24px; }
.modal-actions .btn { flex: 1; padding: 13px 0; font-size: 14px; }

/* ── 반응형 모바일 최적화 ── */
@media (max-width: 768px) {
  header { padding: 0 14px; height: 56px; }
  .header-brand h1 { font-size: 15px; }
  .header-brand p { display: none; }
  main { padding: 14px 8px 32px; }
  .cal-nav h2 { font-size: 20px; }
  .cell { min-height: 65px; padding: 4px 3px; }
  .event-chip { 
    font-size: 10px; 
    padding: 2px 4px; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
    max-width: 100%;
    line-height: 1.2;
  }
  .chip-author { display: none; }
  .modal { padding: 22px 18px; width: 95%; }
  .form-row2 { grid-template-columns: 1fr; }
  .filter-bar { gap: 5px; }
  .filter-chip { font-size: 11px; padding: 4px 10px; }
  .btn-arrow { width: 34px; height: 34px; }
  .day-header { font-size: 11px; padding: 10px 0; }
  .legend { gap: 5px; }
  .legend-item { font-size: 10px; padding: 3px 8px; }
  .more-badge { font-size: 9px; margin-top: 1px; }
  .day-num { width: 22px; height: 22px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="logo">📅</div>
  <p>사내 캘린더 불러오는 중...</p>
</div>

<div class="name-modal-wrap" id="nameModal" style="display:none">
  <div class="name-modal">
    <div class="emoji">👋</div>
    <h2>처음 오셨군요!</h2>
    <p>캘린더에서 사용할 이름을 입력해주세요.<br>팀원들에게 표시됩니다.</p>
    <input class="name-input" id="nameInput" placeholder="홍길동" maxlength="10" />
    <button class="btn btn-primary" style="width:100%;margin-top:16px;padding:14px;font-size:16px" onclick="submitName()">시작하기</button>
  </div>
</div>

<div id="toasts"></div>

<header>
  <div class="header-brand">
    <span class="icon">📅</span>
    <div>
      <h1>사내 캘린더</h1>
      <p>팀 공유 일정 관리</p>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" id="viewToggleBtn" onclick="toggleView()" style="font-size:12px">📋 목록</button>
    <div class="user-chip" onclick="changeName()" title="이름 변경">
      <span>👤</span>
      <span id="userNameDisplay">...</span>
      <span style="color:var(--muted);font-weight:400;font-size:11px">변경</span>
    </div>
  </div>
</header>

<main>
  <div id="calView">
    <div class="cal-nav">
      <button class="btn-arrow" onclick="changeMonth(-1)">‹</button>
      <div style="text-align:center"><h2 id="monthTitle"></h2><p style="font-size:12px;color:#94A3B8;margin-top:4px">📌 날짜를 클릭하면 일정 추가</p><button onclick="goToday()" style="margin-top:6px;background:#EFF6FF;color:#3B82F6;border:1.5px solid #BFDBFE;border-radius:20px;padding:3px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">오늘</button></div>
      <button class="btn-arrow" onclick="changeMonth(1)">›</button>
    </div>

    <div class="filter-bar" id="filterBar"></div>

    <div class="calendar">
      <div class="day-headers">
        <div class="day-header sun">SUN</div>
        <div class="day-header">MON</div>
        <div class="day-header">TUE</div>
        <div class="day-header">WED</div>
        <div class="day-header">THU</div>
        <div class="day-header">FRI</div>
        <div class="day-header sat">SAT</div>
      </div>
      <div class="cells" id="cells"></div>
    </div>

    <div class="legend" id="legend"></div>
  </div>

  <div id="listView" style="display:none">
    <div class="cal-nav">
      <button class="btn-arrow" onclick="changeMonth(-1)">‹</button>
      <div style="text-align:center">
        <h2 id="listMonthTitle"></h2>
        <p style="font-size:12px;color:#94A3B8;margin-top:2px">📋 해당 월 전체 일정</p>
        <button onclick="goToday()" style="margin-top:6px;background:#EFF6FF;color:#3B82F6;border:1.5px solid #BFDBFE;border-radius:20px;padding:3px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">오늘</button>
      </div>
      <button class="btn-arrow" onclick="changeMonth(1)">›</button>
    </div>
    <div id="listItems"></div>
  </div>
</main>


<div class="overlay" id="dayOverlay" style="display:none" onclick="if(event.target===this)document.getElementById('dayOverlay').style.display='none'">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h3 id="dayModalTitle">📅 일정 목록</h3>
      <button class="modal-close" onclick="document.getElementById('dayOverlay').style.display='none'">✕</button>
    </div>
    <div id="dayModalList" style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto"></div>
    <button class="btn btn-primary" id="dayAddBtn" style="width:100%;margin-top:16px;padding:13px;font-size:14px">+ 이 날 일정 추가</button>
  </div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">➕ 일정 추가</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">제목 *</label>
      <input class="form-input" id="fTitle" placeholder="일정 제목" />
    </div>
    <div class="form-row2 form-group">
      <div>
        <label class="form-label">날짜 *</label>
        <input class="form-input" type="date" id="fDate" />
      </div>
      <div>
        <label class="form-label">시간 *</label>
        <input class="form-input" type="time" id="fTime" value="09:00" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <select class="form-input" id="fCategory">
        <option value="incoming_cargo">🚛 화물입고</option>
        <option value="container">📦 컨테이너입고</option>
        <option value="incoming_visit">🟣 방문입고</option>
        <option value="purchase">🟢 매입</option>
        <option value="outgoing_visit">🟠 방문출고</option>
        <option value="delivery">🔴 납품</option>
        <option value="vacation">🟡 휴가</option>
        <option value="other">⚪ 기타</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">메모</label>
      <textarea class="form-input" id="fDesc" rows="2" placeholder="추가 설명 (선택)" style="resize:vertical"></textarea>
    </div>
    <div class="form-group alarm-box" style="margin-bottom:10px">
      <label class="alarm-toggle">
        <input type="checkbox" id="fRepeat" onchange="toggleRepeatUI()" />
        🔁 반복 설정
      </label>
      <div id="repeatRow" style="display:none;margin-top:12px;flex-direction:column;gap:10px">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select class="form-input" id="fRepeatType" style="width:auto;padding:5px 10px" onchange="toggleRepeatUI()">
            <option value="daily">매일</option>
            <option value="weekly">매주</option>
            <option value="weekday">특정 요일</option>
            <option value="monthly">매월</option>
          </select>
        </div>
        <div id="weekdayRow" style="display:none;gap:6px;flex-wrap:wrap">
          <label style="font-size:12px;font-weight:700;color:#64748B;width:100%;margin-bottom:2px">반복 요일 선택</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="0" style="accent-color:#EF4444"> 일</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="1"> 월</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="2"> 화</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="3"> 수</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="4"> 목</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="5" style="accent-color:#3B82F6"> 금</label>
          <label style="display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="dow-check" value="6" style="accent-color:#3B82F6"> 토</label>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#64748B">
          <span>종료일</span>
          <input class="form-input" type="date" id="fRepeatEnd" style="width:auto;padding:5px 10px" />
          <span style="font-size:11px;color:#94A3B8">미입력 시 무기한</span>
        </div>
      </div>
    </div>
    <div class="form-group alarm-box">
      <label class="alarm-toggle">
        <input type="checkbox" id="fAlarm" checked onchange="toggleAlarmUI()" />
        🔔 알람 설정 <span style="font-size:11px;color:var(--slate);font-weight:400">(내 브라우저에서만 울림)</span>
      </label>
      <div class="alarm-timing" id="alarmTimingRow">
        <span>시작</span>
        <select class="form-input" id="fAlarmMin" style="width:auto;padding:5px 10px">
          <option value="5">5분 전</option>
          <option value="10" selected>10분 전</option>
          <option value="15">15분 전</option>
          <option value="30">30분 전</option>
          <option value="60">1시간 전</option>
          <option value="120">2시간 전</option>
          <option value="360">6시간 전</option>
          <option value="1440">1일 전</option>
          <option value="2880">2일 전</option>
          <option value="4320">3일 전</option>
          <option value="7200">5일 전</option>
          <option value="10080">1주일 전</option>
        </select>
        <span>에 알림</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger-soft" id="deleteBtn" style="display:none;flex:0;padding:13px 16px" onclick="deleteCurrentEvent()">삭제</button>
      <button class="btn btn-ghost" id="stopRepeatBtn" style="display:none;flex:0;padding:13px 12px;font-size:12px;background:#FFF7ED;color:#EA580C;border-color:#FED7AA" onclick="stopRepeatFromHere()">🔁 여기서 종료</button>
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ══════════════════════════════════════════════
//  🔥 여기에 Firebase 설정을 붙여넣으세요

function getForeignHolidays(dateStr) {
  const results = [];
  if (FOREIGN_HOLIDAYS[dateStr]) results.push(FOREIGN_HOLIDAYS[dateStr]);
  return results;
}

function getHolidayName(dateStr) {
  if (SUBSTITUTE_HOLIDAYS[dateStr]) return SUBSTITUTE_HOLIDAYS[dateStr];
  if (LUNAR_HOLIDAYS[dateStr]) return LUNAR_HOLIDAYS[dateStr];
  const mmdd = dateStr.slice(5);
  return KR_HOLIDAYS[mmdd] || null;
}

function isSubstituteHoliday(dateStr) {
  return !!SUBSTITUTE_HOLIDAYS[dateStr];
}

// 사용자 색상 (이름 기반 자동 배정)
const USER_COLORS = ["#06B6D4","#F97316","#EC4899","#14B8A6","#6366F1","#84CC16","#EF4444","#8B5CF6"];
const nameColorCache = {};
function userColor(name) {
  if (!nameColorCache[name]) {
    const idx = [...name].reduce((s,c) => s + c.charCodeAt(0), 0) % USER_COLORS.length;
    nameColorCache[name] = USER_COLORS[idx];
  }
  return nameColorCache[name];
}

// ── Firebase 초기화 ─────────────────────────
function initFirebase() {
  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    eventsCol = collection(db, "events");

    // 로딩 숨기고 달력 먼저 렌더
    document.getElementById("loadingScreen").style.display = "none";
    renderAll();

    // 실시간 리스너 (데이터 오면 자동 갱신)
    onSnapshot(eventsCol, (snap) => {
      events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    });

    if (!currentUser) {
      document.getElementById("nameModal").style.display = "flex";
    } else {
      document.getElementById("userNameDisplay").textContent = currentUser;
      startAlarmLoop();
    }
  } catch(e) {
    document.getElementById("loadingScreen").innerHTML = `
      <div style="color:#FCA5A5;font-size:16px;text-align:center;padding:32px">
        <div style="font-size:40px;margin-bottom:16px">⚠️</div>
        <div style="font-weight:700;margin-bottom:8px">Firebase 설정이 필요합니다</div>
        <div style="font-size:13px;color:#94A3B8">index.html 파일에서<br>firebaseConfig 값을 입력해주세요.</div>
      </div>`;
  }
}

window.submitName = function() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) { document.getElementById("nameInput").style.borderColor = "#EF4444"; return; }
  currentUser = name;
  localStorage.setItem("calendarUser", name);
  document.getElementById("userNameDisplay").textContent = name;
  document.getElementById("nameModal").style.display = "none";
  startAlarmLoop();
  addToast(`안녕하세요, ${name}님! 👋`, "success");
};
document.getElementById("nameInput").addEventListener("keydown", e => { if(e.key==="Enter") window.submitName(); });

window.changeName = function() {
  const name = prompt("새 이름을 입력하세요:", currentUser);
  if (name && name.trim()) {
    currentUser = name.trim();
    localStorage.setItem("calendarUser", currentUser);
    document.getElementById("userNameDisplay").textContent = currentUser;
    addToast("이름이 변경되었습니다.", "success");
  }
};

// ── 알람 체크 (30초마다) ──────────────────────
function startAlarmLoop() {
  requestNotifPermission();
  setInterval(checkAlarms, 30000);
  checkAlarms();
}

function checkAlarms() {
  const now = new Date();
  events.forEach(ev => {
    if (!ev.alarm) return;
    const alarmKey = `${ev.id}_${currentUser}`;
    if (firedAlarms[alarmKey]) return;

    const evTime = new Date(`${ev.date}T${ev.time}:00`);
    const diffMin = (evTime - now) / 60000;
    if (diffMin <= (ev.alarmMinutes || 10) && diffMin > -2) {
      const minLabel = diffMin <= 0 ? "지금!" : `${Math.ceil(diffMin)}분 후`;
      addToast(`🔔 [${CATS[ev.category]?.label}] ${ev.title} — ${minLabel}`, "alarm");

      if (Notification.permission === "granted") {
        new Notification("📅 사내 캘린더 알림", {
          body: `${ev.title}\n${ev.date} ${ev.time} (${minLabel})\n등록자: ${ev.author}`,
          icon: "https://cdn-icons-png.flaticon.com/512/747/747310.png",
        });
      }

      firedAlarms[alarmKey] = true;
      localStorage.setItem("firedAlarms", JSON.stringify(firedAlarms));
    }
  });
}

function requestNotifPermission() {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function renderAll() {
  document.getElementById("monthTitle").textContent = `${currentYear}년 ${currentMonth + 1}월`;
  buildFilterBar();
  renderCells();
  renderList();
}

function buildFilterBar() {
  const authors = [...new Set(events.map(e => e.author))].filter(Boolean);
  const bar = document.getElementById("filterBar");
  bar.innerHTML = `
    <span class="filter-chip ${activeFilter==="all"?"active":""}"
      style="background:#F1F5F9;color:var(--slate)"
      onclick="setFilter('all')">전체</span>
    ${authors.map(a => `
      <span class="filter-chip ${activeFilter===a?"active":""}"
        style="background:${userColor(a)}22;color:${userColor(a)}"
        onclick="setFilter('${a}')">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${userColor(a)};margin-right:4px"></span>${a}
      </span>`).join("")}`;
}

window.setFilter = function(val) {
  activeFilter = val;
  renderAll();
};

function filteredEvents() {
  const base = activeFilter === "all" ? events : events.filter(e => e.author === activeFilter);
  const expanded = [];
  const monthStart = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-01`;
  const monthEnd = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${new Date(currentYear, currentMonth+1, 0).getDate()}`;

  base.forEach(ev => {
    if (!ev.repeatMaster) { expanded.push(ev); return; }
    // 반복 마스터 → 이 달에 해당하는 날짜들 생성
    const dates = expandRepeatForMonth(ev, monthStart, monthEnd);
    dates.forEach(d => expanded.push({ ...ev, date: d, _virtual: true }));
  });
  return expanded;
}

function expandRepeatForMonth(ev, monthStart, monthEnd) {
  const type = ev.repeatType;
  const days = ev.repeatDays || [];
  const start = ev.date;
  const end = ev.repeatEnd || "2099-12-31";
  const results = [];

  // 이달의 각 날짜를 순회
  let cur = new Date(monthStart);
  const mEnd = new Date(monthEnd);

  while (cur <= mEnd) {
    const dateStr = cur.toISOString().slice(0,10);
    if (dateStr < start || dateStr > end) { cur.setDate(cur.getDate()+1); continue; }
    const dow = cur.getDay();

    let match = false;
    if (type === "daily") match = true;
    else if (type === "weekly") {
      // 시작일과 같은 요일
      match = new Date(start).getDay() === dow;
    } else if (type === "weekday") match = days.includes(dow);
    else if (type === "monthly") match = new Date(start).getDate() === cur.getDate();

    const excluded = (ev.repeatExclude || []).includes(dateStr);
    if (match && !excluded) results.push(dateStr);
    cur.setDate(cur.getDate()+1);
  }
  return results;
}

function renderCells() {
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const container = document.getElementById("cells");
  container.innerHTML = "";

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement("div");
    el.className = "cell empty";
    container.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const dayEvs = filteredEvents().filter(e => e.date === dateStr)
      .sort((a, b) => a.time > b.time ? 1 : -1);

    const cell = document.createElement("div");
    cell.className = "cell" + (isToday ? " today" : "");
    cell.onclick = () => dayEvs.length > 0 ? openDayModal(dateStr, dayEvs) : openAddModal(dateStr);

    const holiday = getHolidayName(dateStr);
    const isSub = holiday && isSubstituteHoliday(dateStr);
    if (holiday) cell.style.background = isToday ? "#FEF3C7" : (isSub ? "#FFF7ED" : "#FFFBEB");

    const numEl = document.createElement("div");
    const isRed = dow===0 || (holiday && !isSub);
    const isOrange = isSub;
    numEl.className = "day-num" + (isToday ? " is-today" : "") + (isRed && !isToday ? " is-sun" : (!isRed && dow===6 && !isToday && !isOrange ? " is-sat" : ""));
    if (isOrange && !isToday) numEl.style.color = "#EA580C";
    numEl.textContent = d;
    cell.appendChild(numEl);

    if (holiday) {
      const hEl = document.createElement("div");
      hEl.style.cssText = `font-size:10px;color:${isSub?"#EA580C":"#B45309"};font-weight:700;padding:0 2px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`;
      hEl.textContent = (isSub ? "🔄 " : "") + holiday;
      cell.appendChild(hEl);
    }

    dayEvs.slice(0, 3).forEach(ev => {
      const chip = document.createElement("div");
      chip.className = "event-chip";
      chip.style.background = CATS[ev.category]?.bg || "#64748B";
      chip.title = `${ev.title} (${ev.author})`;
      chip.innerHTML = `${ev.alarm ? "🔔" : ""}${ev.repeatGroupId ? "🔁" : ""}<span style="flex:1;overflow:hidden;text-overflow:ellipsis">${ev.time} ${ev.title}</span><span class="chip-author" style="background:rgba(255,255,255,.25);border-radius:4px;padding:0 3px">${ev.author || ""}</span>`;
      chip.onclick = e => { e.stopPropagation(); openEditModal(ev); };
      cell.appendChild(chip);
    });
    if (dayEvs.length > 3) {
      const more = document.createElement("div");
      more.className = "more-badge";
      more.style.cssText = "cursor:pointer;color:#3B82F6;font-weight:700;font-size:11px;padding:1px 3px;";
      more.textContent = `+${dayEvs.length - 3}개 더 보기`;
      more.onclick = e => { e.stopPropagation(); openDayModal(dateStr, dayEvs); };
      cell.appendChild(more);
    }

    // 해외 공휴일
    const foreignHols = getForeignHolidays(dateStr);
    foreignHols.forEach(fh => {
      const fEl = document.createElement("div");
      fEl.style.cssText = "font-size:9px;color:#64748B;padding:0 2px 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;";
      fEl.textContent = fh;
      cell.appendChild(fEl);
    });

    container.appendChild(cell);
  }

  // 범례
  document.getElementById("legend").innerHTML = Object.entries(CATS).map(([,c]) =>
    `<span class="legend-item" style="background:${c.light};color:${c.text}">● ${c.label}</span>`
  ).join("");
}

function renderList() {
  const monthStr = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}`;
  const titleEl = document.getElementById("listMonthTitle");
  if (titleEl) titleEl.textContent = `${currentYear}년 ${currentMonth+1}월`;

  const sorted = filteredEvents()
    .filter(ev => ev.date.startsWith(monthStr))
    .sort((a,b) => `${a.date}${a.time}` > `${b.date}${b.time}` ? 1 : -1);

  const container = document.getElementById("listItems");
  if (!sorted.length) {
    container.innerHTML = `<div style="background:#fff;border-radius:16px;padding:48px;text-align:center;color:var(--muted);font-size:15px">등록된 일정이 없습니다.</div>`;
    return;
  }

  const now = new Date();
  container.innerHTML = sorted.length ? sorted.map(ev => {
    const c = CATS[ev.category] || CATS.other;
    const uc = userColor(ev.author || "?");
    const evTime = new Date(`${ev.date}T${ev.time}`);
    const past = evTime < now;
    return `
      <div class="list-item" style="border-left:4px solid ${c.bg};opacity:${past?0.55:1}">
        <div style="text-align:center;min-width:38px">
          <div style="font-size:11px;color:#94A3B8;font-weight:700">${["일","월","화","수","목","금","토"][evTime.getDay()]}</div>
          <div style="font-size:22px;font-weight:900;color:${evTime.getDay()===0?"#EF4444":evTime.getDay()===6?"#3B82F6":"#1E293B"};line-height:1.1">${ev.date.slice(8)}</div>
        </div>
        <div class="list-info">
          <div class="list-title">${ev.alarm?"🔔 ":""}${ev.title}</div>
          <div class="list-meta">
            <span>${ev.time}</span>
            <span style="display:flex;align-items:center;gap:4px">
              <span class="author-dot" style="background:${uc}"></span>${ev.author || "?"}
            </span>
            ${ev.description ? `<span style="color:var(--muted)">${ev.description}</span>` : ""}
          </div>
        </div>
        <span class="cat-pill" style="background:${c.light};color:${c.text}">${c.label}</span>
        <button class="btn btn-ghost" style="flex:0;padding:6px 12px;font-size:12px" onclick='openEditModal(${JSON.stringify(ev).replace(/'/g,"&apos;")})'>수정</button>
      </div>`;
  }).join("") : `<div style="background:#fff;border-radius:16px;padding:48px;text-align:center;color:var(--muted);font-size:15px">이 달에 등록된 일정이 없습니다.</div>`;
}

// ── 모달 ─────────────────────────────────────
window.openAddModal = function(dateStr) {
  editingId = null;
  document.getElementById("modalTitle").textContent = "➕ 일정 추가";
  document.getElementById("fTitle").value = "";
  document.getElementById("fDate").value = dateStr;
  document.getElementById("fTime").value = "09:00";
  document.getElementById("fCategory").value = "incoming_cargo";
  document.getElementById("fDesc").value = "";
  document.getElementById("fRepeat").checked = false;
  document.getElementById("repeatRow").style.display = "none";
  document.getElementById("weekdayRow").style.display = "none";
  document.getElementById("fRepeatType").value = "weekly";
  document.getElementById("fRepeatEnd").value = "";
  document.querySelectorAll(".dow-check").forEach(c => c.checked = false);
  document.getElementById("fAlarm").checked = true;
  document.getElementById("fAlarmMin").value = "10";
  document.getElementById("alarmTimingRow").style.display = "flex";
  document.getElementById("deleteBtn").style.display = "none";
  document.getElementById("stopRepeatBtn").style.display = "none";
  document.getElementById("overlay").style.display = "flex";
  setTimeout(() => document.getElementById("fTitle").focus(), 100);
};

window.openEditModal = function(ev) {
  editingId = ev.id;
  currentEditDate = ev.date;
  document.getElementById("modalTitle").textContent = "✏️ 일정 수정";
  document.getElementById("fTitle").value = ev.title;
  document.getElementById("fDate").value = ev.date;
  document.getElementById("fTime").value = ev.time;
  document.getElementById("fCategory").value = ev.category;
  document.getElementById("fDesc").value = ev.description || "";
  const hasRepeat = !!ev.repeatType;
  document.getElementById("fRepeat").checked = hasRepeat;
  document.getElementById("fRepeatType").value = ev.repeatType || "weekly";
  document.getElementById("fRepeatEnd").value = ev.repeatEnd || "";
  document.getElementById("repeatRow").style.display = hasRepeat ? "flex" : "none";
  const isWeekday = ev.repeatType === "weekday";
  document.getElementById("weekdayRow").style.display = isWeekday ? "flex" : "none";
  document.querySelectorAll(".dow-check").forEach(c => {
    c.checked = isWeekday && (ev.repeatDays || []).includes(Number(c.value));
  });
  document.getElementById("fAlarm").checked = ev.alarm;
  document.getElementById("fAlarmMin").value = ev.alarmMinutes || 10;
  document.getElementById("alarmTimingRow").style.display = ev.alarm ? "flex" : "none";
  document.getElementById("deleteBtn").style.display = "block";
  document.getElementById("stopRepeatBtn").style.display = ev.repeatGroupId ? "block" : "none";
  document.getElementById("overlay").style.display = "flex";
};

window.stopRepeatFromHere = async function() {
  if (!confirm("이 날짜 이후 반복 일정을 모두 삭제합니다.\n이 일정은 유지됩니다.")) return;
  const ev = events.find(e => e.id === editingId);
  if (!ev || !ev.repeatGroupId) return;
  try {
    const targets = events.filter(e => e.repeatGroupId === ev.repeatGroupId && e.date > ev.date);
    for (const t of targets) await deleteDoc(doc(db, "events", t.id));
    addToast(`이후 반복 일정 ${targets.length}개가 종료되었습니다.`, "success");
    closeModal();
  } catch(e) {
    addToast("오류: " + e.message, "error");
  }
};

window.closeModal = function() {
  document.getElementById("overlay").style.display = "none";
};

window.toggleRepeatUI = function() {
  const checked = document.getElementById("fRepeat").checked;
  const row = document.getElementById("repeatRow");
  row.style.display = checked ? "flex" : "none";
  const type = document.getElementById("fRepeatType").value;
  document.getElementById("weekdayRow").style.display = (checked && type === "weekday") ? "flex" : "none";
};

window.toggleAlarmUI = function() {
  document.getElementById("alarmTimingRow").style.display = document.getElementById("fAlarm").checked ? "flex" : "none";
};

window.saveEvent = async function() {
  const title = document.getElementById("fTitle").value.trim();
  const date = document.getElementById("fDate").value;
  const time = document.getElementById("fTime").value;
  if (!title || !date || !time) { addToast("제목, 날짜, 시간을 입력해주세요.", "error"); return; }

  const data = {
    title, date, time,
    category: document.getElementById("fCategory").value,
    description: document.getElementById("fDesc").value,
    alarm: document.getElementById("fAlarm").checked,
    alarmMinutes: Number(document.getElementById("fAlarmMin").value),
    author: currentUser,
    updatedAt: serverTimestamp(),
  };

  const isRepeat = document.getElementById("fRepeat").checked;
  const repeatType = document.getElementById("fRepeatType").value;
  const repeatEnd = document.getElementById("fRepeatEnd").value;
  const repeatDays = repeatType === "weekday"
    ? [...document.querySelectorAll(".dow-check:checked")].map(c => Number(c.value))
    : [];

  if (isRepeat) {
    data.repeatType = repeatType;
    data.repeatEnd = repeatEnd || null;
    data.repeatDays = repeatDays;
    data.repeatGroupId = editingId || ("rg_" + Date.now());
    data.repeatStopped = false;
  }

  try {
    if (editingId) {
      await updateDoc(doc(db, "events", editingId), data);
      const alarmKey = `${editingId}_${currentUser}`;
      delete firedAlarms[alarmKey];
      localStorage.setItem("firedAlarms", JSON.stringify(firedAlarms));
      addToast("일정이 수정되었습니다.", "success");
    } else if (isRepeat) {
      if (repeatType === "weekday" && repeatDays.length === 0) {
        addToast("반복 요일을 하나 이상 선택해주세요.", "error"); return;
      }
      // 마스터 1개만 저장 (규칙 기반 - 무제한)
      data.repeatMaster = true;
      data.createdAt = serverTimestamp();
      await addDoc(eventsCol, data);
      addToast("반복 일정이 추가되었습니다. ✅", "success");
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(eventsCol, data);
      addToast("일정이 추가되었습니다. ✅", "success");
    }
    closeModal();
  } catch(e) {
    addToast("저장 실패: " + e.message, "error");
  }
};

function generateRepeatDates(startDate, type, endDate, days=[]) {
  const dates = [];
  const end = new Date(endDate);
  let cur = new Date(startDate);
  while (cur <= end && dates.length < 500) {
    const dow = cur.getDay();
    if (type === "weekday") {
      if (days.includes(dow)) dates.push(cur.toISOString().slice(0,10));
      cur.setDate(cur.getDate() + 1);
    } else {
      dates.push(cur.toISOString().slice(0,10));
      if (type === "daily") cur.setDate(cur.getDate() + 1);
      else if (type === "weekly") cur.setDate(cur.getDate() + 7);
      else if (type === "monthly") cur.setMonth(cur.getMonth() + 1);
    }
  }
  return dates;
}

window.deleteCurrentEvent = async function() {
  const ev = events.find(e => e.id === editingId);
  const isRepeat = ev && ev.repeatMaster;

  if (isRepeat) {
    const choice = confirm("반복 일정입니다.\n[확인] 반복 일정 전체 삭제\n[취소] 이 날만 제외하고 유지");
    if (choice) {
      try {
        await deleteDoc(doc(db, "events", ev.id));
        addToast("반복 일정이 삭제되었습니다.", "success");
        closeModal();
      } catch(e) { addToast("삭제 실패: " + e.message, "error"); }
      return;
    } else {
      // 이 날만 예외 처리 - repeatExclude 배열에 추가
      try {
        const excludes = ev.repeatExclude || [];
        if (!excludes.includes(currentEditDate)) excludes.push(currentEditDate);
        await updateDoc(doc(db, "events", ev.id), { repeatExclude: excludes });
        addToast("이 날 일정이 제외되었습니다.", "success");
        closeModal();
      } catch(e) { addToast("오류: " + e.message, "error"); }
      return;
    }
  } else {
    if (!confirm("정말 삭제하시겠습니까?")) return;
  }
  try {
    await deleteDoc(doc(db, "events", editingId));
    addToast("일정이 삭제되었습니다.", "success");
    closeModal();
  } catch(e) {
    addToast("삭제 실패: " + e.message, "error");
  }
};

// ── 뷰/월 전환 ────────────────────────────────
window.goToday = function() {
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  renderAll();
};

window.changeMonth = function(dir) {
  currentMonth += dir;
  if (currentMonth < 0) { currentYear--; currentMonth = 11; }
  if (currentMonth > 11) { currentYear++; currentMonth = 0; }
  renderAll();
};

window.toggleView = function() {
  currentView = currentView === "cal" ? "list" : "cal";
  document.getElementById("calView").style.display = currentView === "cal" ? "" : "none";
  document.getElementById("listView").style.display = currentView === "list" ? "" : "none";
  document.getElementById("viewToggleBtn").textContent = currentView === "cal" ? "📋 목록" : "📅 달력";
};

// ── 토스트 ────────────────────────────────────
function addToast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

currentYear = today.getFullYear();
currentMonth = today.getMonth();
initFirebase();

// ── 스와이프 제스처 ───────────────────────────
(function() {
  let startX = 0, startY = 0;

  document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // 수평 스와이프만 (세로 스크롤과 구분)
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      changeMonth(dx < 0 ? 1 : -1);
    }
  }, { passive: true });
})();
